include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - lib/firebase_options.dart
    - "**/*.g.dart"

linter:
  rules:
    # This is a solo, single-user app, not a published package.
    public_member_api_docs: false
    # Conflicts with the conventional `flutter:` sdk-dependency-first ordering.
    sort_pub_dependencies: false
